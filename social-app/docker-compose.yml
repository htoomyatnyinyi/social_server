services:
  # ────────────────────────────────────────────────
  # PostgreSQL for SOCIAL APP
  social_db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.social
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oasis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oasis_password_change_me_please}
      POSTGRES_DB: ${POSTGRES_DB:-social_db}
    ports:
      - "5432:5432"
    volumes:
      - social_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "${POSTGRES_USER:-oasis}",
          "-d",
          "${POSTGRES_DB:-social_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-network

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - social-network

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.social
    # Variables can be inherited from .env.social automatically
    # DATABASE_URL: ${DATABASE_URL}
    # REDIS_URL: ${REDIS_URL}
    # JWT_SECRET: ${JWT_SECRET}
    depends_on:
      social_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - social-network

volumes:
  social_pgdata:

networks:
  social-network:
    external: true
    name: social-network
